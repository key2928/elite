<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 280" width="512" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0710"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="text-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff85c8"/>
      <stop offset="60%" style="stop-color:#e8329a"/>
      <stop offset="100%" style="stop-color:#c01878"/>
    </linearGradient>
    <linearGradient id="text-sub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d62bc5"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="280" rx="50" fill="url(#bg)"/>

  <!-- Soft glow -->
  <ellipse cx="256" cy="140" rx="220" ry="120" fill="#e8329a" opacity="0.06"/>

  <!-- "ELITE" -->
  <text x="256" y="100" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" font-style="italic"
        fill="url(#text-main)" text-anchor="middle" letter-spacing="3" filter="url(#glow)">ELITE</text>

  <!-- Separator line -->
  <rect x="56" y="114" width="400" height="3" rx="2" fill="url(#text-main)" opacity="0.6"/>

  <!-- "THAI" -->
  <text x="256" y="186" font-family="Arial, sans-serif" font-size="68" font-weight="800"
        fill="rgba(255,255,255,0.92)" text-anchor="middle" letter-spacing="14">THAI</text>

  <!-- Bottom accent line -->
  <rect x="56" y="200" width="400" height="3" rx="2" fill="url(#text-sub)" opacity="0.6"/>

  <!-- "GIRLS" -->
  <text x="256" y="255" font-family="Arial, sans-serif" font-size="40" font-weight="700"
        fill="url(#text-sub)" text-anchor="middle" letter-spacing="18">GIRLS</text>
</svg>
