<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0710"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="crown-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3e0"/>
      <stop offset="50%" style="stop-color:#e8329a"/>
      <stop offset="100%" style="stop-color:#c01878"/>
    </linearGradient>
    <linearGradient id="crown-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6f0"/>
      <stop offset="100%" style="stop-color:#ff85c8"/>
    </linearGradient>
    <linearGradient id="gem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#d62bc5" flood-opacity="0.55"/>
    </filter>
    <symbol id="sparkle" viewBox="72 148 32 64">
      <polygon points="88,180 92,192 104,192 94,200 98,212 88,204 78,212 82,200 72,192 84,192"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Radial ambient glow -->
  <radialGradient id="ambient" cx="50%" cy="42%" r="50%">
    <stop offset="0%" style="stop-color:#9d174d;stop-opacity:0.22"/>
    <stop offset="100%" style="stop-color:#0b0710;stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="80" fill="url(#ambient)"/>

  <!-- ===== CROWN ===== -->
  <g filter="url(#soft-shadow)">
    <!-- Crown base band -->
    <rect x="128" y="268" width="256" height="54" rx="14" fill="url(#crown-grad)"/>
    <!-- Crown base highlight -->
    <rect x="128" y="268" width="256" height="20" rx="14" fill="url(#crown-shine)" opacity="0.45"/>

    <!-- Crown left spike -->
    <polygon points="142,268 168,148 194,268" fill="url(#crown-grad)"/>
    <polygon points="148,268 168,162 188,268" fill="url(#crown-shine)" opacity="0.35"/>

    <!-- Crown center spike (tallest) -->
    <polygon points="220,268 256,118 292,268" fill="url(#crown-grad)"/>
    <polygon points="228,268 256,134 284,268" fill="url(#crown-shine)" opacity="0.4"/>

    <!-- Crown right spike -->
    <polygon points="318,268 344,148 370,268" fill="url(#crown-grad)"/>
    <polygon points="324,268 344,162 364,268" fill="url(#crown-shine)" opacity="0.35"/>

    <!-- Gem on center spike -->
    <circle cx="256" cy="128" r="20" fill="url(#gem-grad)" filter="url(#glow)"/>
    <circle cx="248" cy="121" r="6" fill="rgba(255,255,255,0.55)"/>

    <!-- Gem on left spike -->
    <circle cx="168" cy="158" r="13" fill="url(#gem-grad)" filter="url(#glow)"/>
    <circle cx="163" cy="153" r="4" fill="rgba(255,255,255,0.5)"/>

    <!-- Gem on right spike -->
    <circle cx="344" cy="158" r="13" fill="url(#gem-grad)" filter="url(#glow)"/>
    <circle cx="339" cy="153" r="4" fill="rgba(255,255,255,0.5)"/>

    <!-- Small diamonds on base band -->
    <polygon points="256,268 264,288 256,308 248,288" fill="rgba(255,255,255,0.30)"/>
    <polygon points="196,268 202,284 196,300 190,284" fill="rgba(255,255,255,0.20)"/>
    <polygon points="316,268 322,284 316,300 310,284" fill="rgba(255,255,255,0.20)"/>
  </g>

  <!-- Decorative sparkles -->
  <g fill="#ff85c8" opacity="0.7" filter="url(#glow)">
    <use href="#sparkle" x="-33" y="-93" width="19" height="38"/>
    <use href="#sparkle" x="290" y="-113" width="14" height="29"/>
  </g>

  <!-- "ELITE THAI" label -->
  <text x="256" y="398" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" font-style="italic"
        fill="url(#crown-grad)" text-anchor="middle" letter-spacing="1" filter="url(#glow)">ELITE THAI</text>

  <!-- Accent line -->
  <rect x="100" y="408" width="312" height="3" rx="2" fill="url(#crown-grad)" opacity="0.75"/>

  <!-- "GIRLS" sub-label -->
  <text x="256" y="452" font-family="Arial, sans-serif" font-size="26" font-weight="700"
        fill="rgba(255,255,255,0.80)" text-anchor="middle" letter-spacing="12">GIRLS</text>
</svg>
