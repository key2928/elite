<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0710"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d62bc5"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ef7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow effect -->
  <circle cx="256" cy="200" r="180" fill="url(#glow)"/>
  <!-- Pink accent circle -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.5"/>
  <!-- Boxing gloves icon (stylized) -->
  <!-- Left glove -->
  <rect x="148" y="175" width="80" height="100" rx="40" fill="url(#grad)" opacity="0.9"/>
  <rect x="148" y="175" width="80" height="55" rx="30" fill="url(#grad)"/>
  <!-- Right glove -->
  <rect x="284" y="175" width="80" height="100" rx="40" fill="url(#grad)" opacity="0.9"/>
  <rect x="284" y="175" width="80" height="55" rx="30" fill="url(#grad)"/>
  <!-- Glove knuckle highlights -->
  <rect x="155" y="182" width="66" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <rect x="291" y="182" width="66" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <!-- Wrist bands -->
  <rect x="152" y="260" width="72" height="25" rx="8" fill="#7b2cbf" opacity="0.8"/>
  <rect x="288" y="260" width="72" height="25" rx="8" fill="#7b2cbf" opacity="0.8"/>
  <!-- "ET" text -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="52" font-weight="900" font-style="italic" fill="url(#grad)" text-anchor="middle" letter-spacing="-2">ET</text>
  <!-- "GIRLS" text at bottom -->
  <text x="256" y="390" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="8">GIRLS</text>
  <!-- Bottom line accent -->
  <rect x="96" y="406" width="320" height="3" rx="2" fill="url(#grad)" opacity="0.7"/>
  <!-- "ELITE THAI" at very bottom -->
  <text x="256" y="445" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">ELITE THAI</text>
</svg>
